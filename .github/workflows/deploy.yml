name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set environment variables
        run: |
          echo "VITE_TRACKER_URL=${{ secrets.VITE_TRACKER_URL }}" >> $GITHUB_ENV

      - run: npm install
      - name: Build for GitHub Pages
        run: npm run build
        env:
          # 须与 GitHub 仓库名一致（本仓库默认 liz-portfolio）
          VITE_BASE_PATH: /liz-portfolio/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github_pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4